<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Run config path placeholder</title>
  <desc id="desc">A placeholder screenshot showing the Windows Run dialog.</desc>
  <rect width="960" height="540" fill="#eef2ff"/>
  <rect x="220" y="140" width="520" height="260" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <rect x="220" y="140" width="520" height="42" rx="8" fill="#e2e8f0"/>
  <text x="246" y="168" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Run</text>
  <text x="256" y="236" font-family="Arial, sans-serif" font-size="17" fill="#334155">Open:</text>
  <rect x="256" y="260" width="448" height="42" rx="5" fill="#ffffff" stroke="#64748b"/>
  <text x="276" y="287" font-family="Consolas, monospace" font-size="17" fill="#0f172a">%userprofile%\.codex/config.toml</text>
  <rect x="490" y="330" width="94" height="36" rx="5" fill="#2563eb"/>
  <text x="537" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">OK</text>
  <rect x="604" y="330" width="100" height="36" rx="5" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="654" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334155">Cancel</text>
</svg>
