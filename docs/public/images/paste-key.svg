<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Paste API key placeholder</title>
  <desc id="desc">A placeholder screenshot showing a masked API key in auth.json.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="96" y="56" width="768" height="428" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="96" y="56" width="768" height="42" rx="10" fill="#e2e8f0"/>
  <text x="124" y="83" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">auth.json - Notepad</text>
  <g font-family="Consolas, monospace" font-size="18" fill="#334155">
    <text x="132" y="148">{</text>
    <text x="160" y="188">"OPENAI_API_KEY": "sk-************************"</text>
    <text x="132" y="228">}</text>
  </g>
  <rect x="132" y="282" width="696" height="66" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="480" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">Paste your own key, then save the file</text>
</svg>
